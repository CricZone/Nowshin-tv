name: Update README Live Dashboard

on:
  schedule:
    # প্রতিদিন বাংলাদেশ সময় রাত ১২:০৫ মিনিটে রান হবে (যা UTC সময় সন্ধ্যা ৬:০৫)
    - cron: '5 18 * * *'
  workflow_dispatch: # চাইলে আপনি নিজেও ম্যানুয়ালি ক্লিক করে রান করতে পারবেন

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pytz

    - name: Run Update Script
      run: python update_time.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add README.md
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-updated Live Dashboard & Prayer Times"
        git push
