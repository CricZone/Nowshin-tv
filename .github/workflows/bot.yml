name: NowshinTV Automatic Stream Engine Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Cluster
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Execute Stream Validation Script
        run: |
          const fs = require('fs');
          const https = require('https');
          const http = require('http');

          const playlistPath = 'playlist.m3u';
          if (!fs.existsSync(playlistPath)) {
              console.log("Target Playlist Not Found.");
              process.exit(0);
          }

          let data = fs.readFileSync(playlistPath, 'utf8');
          const lines = data.split('\n');
          let updatedLines = [];
          let currentMetadataIndex = -1;

          async function verifyLink(url) {
              const cleanUrl = url.split('|')[0].trim();
              return new Promise((resolve) => {
                  const client = cleanUrl.startsWith('https') ? https : http;
                  const req = client.get(cleanUrl, { timeout: 6000 }, (res) => {
                      resolve(true); 
                  });
                  req.on('error', () => resolve(false));
                  req.on('timeout', () => { req.destroy(); resolve(false); });
              });
          }

          async function processPlaylist() {
              for (let i = 0; i < lines.length; i++) {
                  let line = lines[i].trim();
                  if (line.startsWith('#EXTINF:')) {
                      updatedLines.push(line);
                      currentMetadataIndex = updatedLines.length - 1;
                  } else if (line && !line.startsWith('#')) {
                      console.log(`Processing background check for stream: ${line}`);
                      let isAlive = await verifyLink(line);
                      let statusString = isAlive ? 'status="Online"' : 'status="Offline"';
                      
                      let metaLine = updatedLines[currentMetadataIndex];
                      if (metaLine.includes('status="')) {
                          metaLine = metaLine.replace(/status="[^"]*"/, statusString);
                      } else {
                          metaLine = metaLine.replace(/,/, ` ${statusString},`);
                      }
                      updatedLines[currentMetadataIndex] = metaLine;
                      updatedLines.push(line);
                  } else {
                      if (line || i === lines.length - 1) updatedLines.push(line);
                  }
              }
              fs.writeFileSync(playlistPath, updatedLines.join('\n'), 'utf8');
          }

          processPlaylist().then(() => console.log("Stream Sync Pipeline Finished."));

      - name: Commit and Push Dynamic Pipeline Mutations
        run: |
          git config --global user.name "nowshintv-bot"
          git config --global user.email "bot@nowshin.tv"
          git add playlist.m3u
          git diff-index --quiet HEAD || git commit -m "Automated Cron Stream Sync Engine Execution [15 Min Check]"
          git push
