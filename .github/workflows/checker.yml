name: Ultimate IPTV Auto Checker

on:
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর অটো রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য Run workflow বাটন অন করবে

jobs:
  check-channels:
    runs-on: ubuntu-latest

    steps:
    # ১. রিপোজিটরির কোড অ্যাকশন রানারে নিয়ে আসা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. নোড জেএস (Node.js) এনভায়রনমেন্ট সেটআপ করা
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # ৩. m3u8-parser ডিপেন্ডেন্সি ইনস্টল করা
    - name: Install Node Dependencies
      run: npm install m3u8-parser

    # 🛠️ ৪. লিনাক্স রানারে FFmpeg এবং FFprobe ইনস্টল করা (রিয়েল ডিকোড চেকের জন্য)
    - name: Install FFmpeg & FFprobe
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # 🚀 ৫. আপনার তৈরি করা checker.js ফাইলটি রান করা
    - name: Run Ultimate Checker Script
      run: node checker.js

    # ৬. ফাইল আপডেট হলে তা স্বয়ংক্রিয়ভাবে গিটহাবে পুশ করা
    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add channels.json playlist.m3u
        
        # কোনো পরিবর্তন না থাকলে যেন অ্যাকশন ফেইল না করে, সেজন্য || exit 0 ব্যবহার করা হয়েছে
        git commit -m "Automated Playlist Update" || exit 0
        git push
