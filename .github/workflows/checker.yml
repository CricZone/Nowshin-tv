name: 15-Min Auto Channel Checker Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-channels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Advanced Stream Checker Script
        run: |
          node -e '
          const fs = require("fs");
          const https = require("https");
          const http = require("http");
          const { URL } = require("url");

          function checkUrl(url) {
            let cleanUrl = url.split("|")[0].trim();
            let headers = { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" };
            
            if (url.includes("|")) {
              let parts = url.split("|")[1].split("&");
              parts.forEach(p => {
                let kv = p.split("=");
                if(kv.length === 2) {
                  let key = kv[0].trim().toLowerCase();
                  let val = decodeURIComponent(kv[1].trim());
                  if(key === "referer") headers["Referer"] = val;
                  if(key === "user-agent") headers["User-Agent"] = val;
                }
              });
            }

            return new Promise((resolve) => {
              try {
                const parsedUrl = new URL(cleanUrl);
                const client = parsedUrl.protocol === "https:" ? https : http;
                
                // টাইমআউট ২০ সেকেন্ড করা হলো গিটহাবের স্লো সার্ভারের জন্য
                const options = {
                  method: "GET",
                  headers: headers,
                  timeout: 20000 
                };

                const req = client.request(cleanUrl, options, (res) => {
                  // স্ট্রিমিং সার্ভার ২০০, ৩০০ বা ৪MD (যেমন টোকেন এরর বা রিজিয়ন লক হলেও সচল রাখা) রেঞ্জ দিলে অনলাইন ধরবে
                  if (res.statusCode >= 200 && res.statusCode < 500) {
                    resolve(true);
                  } else {
                    resolve(false);
                  }
                  req.destroy();
                });

                req.on("error", () => resolve(false));
                req.on("timeout", () => { req.destroy(); resolve(false); });
                req.end();
              } catch (e) {
                resolve(false);
              }
            });
          }

          async function start() {
            if (!fs.existsSync("channels.json")) {
              console.log("channels.json missing.");
              return;
            }
            let channels = JSON.parse(fs.readFileSync("channels.json", "utf8"));
            
            console.log("Checking " + channels.length + " channels...");
            
            for (let ch of channels) {
              let isLive = await checkUrl(ch.url);
              
              // ফেল কাউন্টার লজিক: হুট করে অফলাইন করবে না
              if (!ch.fail_count) ch.fail_count = 0;

              if (isLive) {
                ch.status = "Online";
                ch.fail_count = 0; // অনলাইন পেলে কাউন্টার রিসেট
              } else {
                ch.fail_count++;
                // পর পর ৩ বার (৪৫ মিনিট) অফলাইন থাকলেই কেবল অফলাইন স্ট্যাটাস দেবে
                if (ch.fail_count >= 3) {
                  ch.status = "Offline";
                } else {
                  ch.status = "Online"; // সাময়িক ডাউন হলে অনলাইনই রাখবে
                }
              }
              console.log(`Channel [${ch.name}] - Status: ${ch.status} (Fail Count: ${ch.fail_count})`);
            }

            channels.sort((a,b) => a.serial - b.serial);
            fs.writeFileSync("channels.json", JSON.stringify(channels, null, 2));
            
            let m3u = "#EXTM3U\n";
            channels.forEach(ch => {
              if (ch.status === "Online") {
                let cleanUrl = ch.url.split("|")[0].trim();
                let extra = "";
                if (ch.url.includes("|")) {
                  let parts = ch.url.split("|")[1].split("&");
                  parts.forEach(p => {
                    let kv = p.split("=");
                    if(kv.length === 2) {
                      let key = kv[0].trim().toLowerCase();
                      if(key === "referer") extra += `|Referer=${kv[1].trim()}`;
                      if(key === "user-agent") extra += `|User-Agent=${kv[1].trim()}`;
                    }
                  });
                }
                m3u += `#EXTINF:-1 tvg-id=\"${ch.serial}\" tvg-name=\"${ch.name}\" tvg-logo=\"${ch.logo}\" group-title=\"${ch.category}\",${ch.name}\n${cleanUrl}${extra}\n`;
              }
            });
            fs.writeFileSync("playlist.m3u", m3u);
            console.log("Database & Playlist Updated Safely.");
          }
          start();
          '

      - name: Commit and Push Changes
        run: |
          git config --global user.name "NowshinTV Bot"
          git config --global user.email "bot@nowshintv.com"
          git add channels.json playlist.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Bot: Smart Sync [Skip CI]" && git push)
