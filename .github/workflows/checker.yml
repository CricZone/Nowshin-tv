Name: 15-Min Auto Channel Checker Bot
on:
  Schedule:
    - cron: '*/15 * * * *'
  Workflow_dispatch:

Jobs:
  Check-channels:
    Runs-on: ubuntu-latest
    Steps:
      - name: Checkout Repository
        Uses: actions/checkout@v4

      - name: Setup Node.js
        Uses: actions/setup-node@v4
        With:
          Node-version: 20

      - name: Run Checker Script
        Run: |
          Node -e '
          Const fs = require("fs");
          Const https = require("https");
          Const http = require("http");

          Async function checkUrl(url) {
            Let cleanUrl = url.split("|")[0].trim();
            Let headers = { 
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "*/*"
            };
            
            If (url.includes("|")) {
              Let parts = url.split("|")[1].split("&");
              Parts.forEach(p => {
                Let kv = p.split("=");
                If(kv[0] && kv[1]) {
                  If(kv[0].toLowerCase() === "referer") headers["Referer"] = kv[1];
                  If(kv[0].toLowerCase() === "user-agent") headers["User-Agent"] = kv[1];
                }
              });
            }

            Return new Promise((resolve) => {
              Const client = cleanUrl.startsWith("https") ? https : http;
              // Toffee বা dynamic লিঙ্ক ভেরিফিকেশনের জন্য GET মেথড ব্যবহার করা হলো
              Const req = client.request(cleanUrl, { method: "GET", headers: headers, timeout: 7000 }, (res) => {
                If (res.statusCode >= 200 && res.statusCode < 400) resolve(true);
                Else resolve(false);
              });
              Req.on("error", () => resolve(false));
              Req.on("timeout", () => { req.destroy(); resolve(false); });
              Req.end();
            });
          }

          Async function start() {
            If (!fs.existsSync("channels.json")) return;
            Let channels = JSON.parse(fs.readFileSync("channels.json", "utf8"));
            Let changed = false;

            For (let ch of channels) {
              Let isLive = await checkUrl(ch.url);
              Let newStatus = isLive ? "Online" : "Offline";
              If (ch.status !== newStatus) {
                Ch.status = newStatus;
                Changed = true;
              }
            }

            If (changed) {
              Fs.writeFileSync("channels.json", JSON.stringify(channels, null, 2));
              
              // dynamic M3U Playlist জেনারেশন (শুধু অনলাইন চ্যানেল থাকবে Televizo এর জন্য)
              Let m3u = "#EXTM3U\n";
              Channels.forEach(ch => {
                If (ch.status === "Online") {
                  Let cleanUrl = ch.url.split("|")[0].trim();
                  Let extra = "";
                  If (ch.url.includes("|")) {
                    Let parts = ch.url.split("|")[1].split("&");
                    Parts.forEach(p => {
                      Let kv = p.split("=");
                      If(kv[0].toLowerCase() === "referer") extra += `|Referer=${kv[1]}`;
                      If(kv[0].toLowerCase() === "user-agent") extra += `|User-Agent=${kv[1]}`;
                    });
                  }
                  M3u += `#EXTINF:-1 tvg-id=\"${ch.serial}\" tvg-name=\"${ch.name}\" tvg-logo=\"${ch.logo}\" group-title=\"${ch.category}\",${ch.name}\n${cleanUrl}${extra}\n`;
                }
              });
              Fs.writeFileSync("playlist.m3u", m3u);
              Console.log("Database & Dynamic Playlist updated successfully via Bot.");
            } else {
              Console.log("No status variance detected.");
            }
          }
          Start();
          '

      - name: Commit and Push Changes
        Run: |
          Git config --global user.name "NowshinTV Bot"
          Git config --global user.email "bot@nowshintv.com"
          Git add channels.json playlist.m3u
          Git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Bot: Sync Channel States & M3U Playlist" && git push)
