      - name: Run Advanced Stream Checker Script
        run: |
          node -e '
          const fs = require("fs");
          const https = require("https");
          const http = require("http");
          const { URL } = require("url");

          function checkUrl(url) {
            let cleanUrl = url.split("|")[0].trim();
            let headers = { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" };
            
            if (url.includes("|")) {
              let parts = url.split("|")[1].split("&");
              parts.forEach(p => {
                let kv = p.split("=");
                if(kv.length === 2) {
                  let key = kv[0].trim().toLowerCase();
                  let val = decodeURIComponent(kv[1].trim());
                  if(key === "referer") headers["Referer"] = val;
                  if(key === "user-agent") headers["User-Agent"] = val;
                }
              });
            }

            return new Promise((resolve) => {
              try {
                const parsedUrl = new URL(cleanUrl);
                const client = parsedUrl.protocol === "https:" ? https : http;
                
                // এখানে HEAD রিকোয়েস্ট ব্যবহার করা হয়েছে, যা ভিডিও ডাউনলোড না করে শুধু লিংক সচল কি না চেক করে
                const options = {
                  method: "HEAD",
                  headers: headers,
                  timeout: 8000
                };

                const req = client.request(cleanUrl, options, (res) => {
                  // যদি স্ট্রিমিং সার্ভার ২০০ বা ৩০০ রেঞ্জের রেসপন্স দেয় (Redirect সহ)
                  if (res.statusCode >= 200 && res.statusCode < 400) {
                    resolve(true);
                  } else {
                    // কিছু কিছু স্ট্রিমিং সার্ভার HEAD রিকোয়েস্ট ব্লক করে, তাদের জন্য ব্যাকআপ GET
                    if (res.statusCode === 405 || res.statusCode === 404) {
                      options.method = "GET";
                      const getReq = client.request(cleanUrl, options, (getRes) => {
                        if (getRes.statusCode >= 200 && getRes.statusCode < 400) {
                          resolve(true);
                        } else {
                          resolve(false);
                        }
                        getReq.destroy();
                      });
                      getReq.on("error", () => resolve(false));
                      getReq.end();
                    } else {
                      resolve(false);
                    }
                  }
                });

                req.on("error", () => resolve(false));
                req.on("timeout", () => { req.destroy(); resolve(false); });
                req.end();
              } catch (e) {
                resolve(false);
              }
            });
          }

          async function start() {
            if (!fs.existsSync("channels.json")) {
              console.log("channels.json missing.");
              return;
            }
            let channels = JSON.parse(fs.readFileSync("channels.json", "utf8"));
            
            console.log("Starting Verification for " + channels.length + " channels...");
            
            for (let ch of channels) {
              let isLive = await checkUrl(ch.url);
              let newStatus = isLive ? "Online" : "Offline";
              console.log(`Channel [${ch.name}] calculated status: ${newStatus}`);
              ch.status = newStatus;
            }

            channels.sort((a,b) => a.serial - b.serial);
            fs.writeFileSync("channels.json", JSON.stringify(channels, null, 2));
            
            let m3u = "#EXTM3U\n";
            channels.forEach(ch => {
              if (ch.status === "Online") {
                let cleanUrl = ch.url.split("|")[0].trim();
                let extra = "";
                if (ch.url.includes("|")) {
                  let parts = ch.url.split("|")[1].split("&");
                  parts.forEach(p => {
                    let kv = p.split("=");
                    if(kv.length === 2) {
                      let key = kv[0].trim().toLowerCase();
                      if(key === "referer") extra += `|Referer=${kv[1].trim()}`;
                      if(key === "user-agent") extra += `|User-Agent=${kv[1].trim()}`;
                    }
                  });
                }
                m3u += `#EXTINF:-1 tvg-id=\"${ch.serial}\" tvg-name=\"${ch.name}\" tvg-logo=\"${ch.logo}\" group-title=\"${ch.category}\",${ch.name}\n${cleanUrl}${extra}\n`;
              }
            });
            fs.writeFileSync("playlist.m3u", m3u);
            console.log("Database & Playlist Sync Processing Finished.");
          }
          start();
          '
