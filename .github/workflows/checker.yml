name: 15-Min Auto Channel Checker Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-channels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Advanced Checker Script
        run: |
          node -e '
          const fs = require("fs");
          const https = require("https");
          const http = require("http");

          function requestUrl(url, headers) {
            return new Promise((resolve) => {
              const cleanUrl = url.split("|")[0].trim();
              const client = cleanUrl.startsWith("https") ? https : http;
              
              const req = client.request(cleanUrl, { 
                method: "GET", 
                headers: headers, 
                timeout: 7000 
              }, (res) => {
                let chunks = [];
                res.on("data", (chunk) => { if(chunks.length < 5) chunks.push(chunk); });
                
                res.on("end", () => {
                  const statusCode = res.statusCode;
                  const contentType = (res.headers["content-type"] || "").toLowerCase();
                  
                  // রিয়েল-টাইম স্ট্যাটাস ভ্যালিডেশন (কোড ২০০-৩৯৯ এবং কনটেন্ট টাইপ চেকিং)
                  if (statusCode >= 200 && statusCode < 400) {
                    // টফি বা অন্যান্য স্ট্রিমিং সার্ভারের ফেক html পেজ ডিটেকশন প্রসেস
                    if (contentType.includes("html") || contentType.includes("text/plain")) {
                      const buffer = Buffer.concat(chunks).toString().toLowerCase();
                      if (buffer.includes("error") || buffer.includes("failed") || buffer.includes("denied") || buffer.length < 200) {
                        return resolve(false); // ফেক বা এক্সপায়ার্ড লিংক
                      }
                    }
                    resolve(true);
                  } else {
                    resolve(false);
                  }
                });
              });

              req.on("error", () => resolve(false));
              req.on("timeout", () => { req.destroy(); resolve(false); });
              req.end();
            });
          }

          async function checkUrl(url) {
            let cleanUrl = url.split("|")[0].trim();
            let headers = { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" };
            
            if (url.includes("|")) {
              let parts = url.split("|")[1].split("&");
              parts.forEach(p => {
                let kv = p.split("=");
                if(kv[0] && kv[1]) {
                  let key = kv[0].trim().toLowerCase();
                  let val = kv[1].trim();
                  if(key === "referer") headers["Referer"] = val;
                  if(key === "user-agent") headers["User-Agent"] = val;
                }
              });
            }
            return await requestUrl(cleanUrl, headers);
          }

          async function start() {
            if (!fs.existsSync("channels.json")) {
              fs.writeFileSync("channels.json", JSON.stringify([], null, 2));
              return;
            }
            let channels = JSON.parse(fs.readFileSync("channels.json", "utf8"));
            let changed = false;

            for (let ch of channels) {
              let isLive = await checkUrl(ch.url);
              let newStatus = isLive ? "Online" : "Offline";
              if (ch.status !== newStatus) {
                console.log(`Channel [${ch.name}] status changed from ${ch.status} to ${newStatus}`);
                ch.status = newStatus;
                changed = true;
              }
            }

            // সবসময় playlist.m3u জেনারেট হবে যাতে ডাটাবেস সম্পূর্ণ সিঙ্ক থাকে
            let m3u = "#EXTM3U\n";
            channels.forEach(ch => {
              if (ch.status === "Online") {
                let cleanUrl = ch.url.split("|")[0].trim();
                let extra = "";
                if (ch.url.includes("|")) {
                  let parts = ch.url.split("|")[1].split("&");
                  parts.forEach(p => {
                    let kv = p.split("=");
                    if(kv[0] && kv[1]) {
                      let key = kv[0].trim().toLowerCase();
                      let val = kv[1].trim();
                      if(key === "referer") extra += `|Referer=${val}`;
                      if(key === "user-agent") extra += `|User-Agent=${val}`;
                    }
                  });
                }
                m3u += `#EXTINF:-1 tvg-id=\"${ch.serial}\" tvg-name=\"${ch.name}\" tvg-logo=\"${ch.logo}\" group-title=\"${ch.category}\",${ch.name}\n${cleanUrl}${extra}\n`;
              }
            });
            fs.writeFileSync("playlist.m3u", m3u);
            fs.writeFileSync("channels.json", JSON.stringify(channels, null, 2));
            console.log("Database & Playlist verified/updated.");
          }
          start();
          '

      - name: Commit and Push Changes
        run: |
          git config --global user.name "NowshinTV Bot"
          git config --global user.email "bot@nowshintv.com"
          git add channels.json playlist.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Bot: 15-Min System Check & Live Update" && git push)
