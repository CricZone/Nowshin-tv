name: 15-Min Auto Channel Checker Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-channels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Checker Script
        run: |
          node -e '
          const fs = require("fs");
          const https = require("https");
          const http = require("http");

          // ৩ বার রিট্রাই করার লজিকসহ নিখুঁত ইউআরএল চেকার
          async function fetchWithRetry(url, headers, retries = 3) {
            for (let i = 0; i < retries; i++) {
              let isLive = await new Promise((resolve) => {
                const client = url.startsWith("https") ? https : http;
                const options = { 
                  method: "GET", 
                  headers: headers, 
                  timeout: 7000 // একটু বেশি সময় দেওয়া হলো নেটওয়ার্ক স্লোর জন্য
                };

                const req = client.request(url, options, (res) => {
                  let chunks = [];
                  
                  // শুধু রেসপন্স কোড দেখলেই হবে না, ডেটা চেক করতে হবে
                  res.on("data", (chunk) => {
                    chunks.push(chunk);
                    // প্রথম ৪ কিলোবাইট ডেটা পেলেই আমরা রিড করা বন্ধ করব (পুরো ভিডিও ডাউনলোড দরকার নেই)
                    if (Buffer.concat(chunks).length > 4096) {
                      req.destroy();
                    }
                  });

                  res.on("end", () => {
                    let buffer = Buffer.concat(chunks);
                    let content = buffer.toString("utf8").trim();
                    let statusCode = res.statusCode;

                    if (statusCode >= 200 && statusCode < 300) {
                      // তোফি বা এই ধরণের প্লে-লিস্টের প্রথম লাইনে অবশ্যই #EXTM3U বা m3u8 এর ট্যাগ থাকতে হবে
                      if (content.includes("#EXTM3U") || content.includes("#EXT-X-") || content.includes("application/vnd.apple.mpegurl") || res.headers["content-type"]?.includes("mpegurl")) {
                        resolve(true);
                      } else {
                        // স্ট্যাটাস ২০০ হলেও যদি ভেতরে আসল ম্যাসাজ না থাকে (ভুল পেজ)
                        resolve(false);
                      }
                    } else if (statusCode >= 300 && statusCode < 400) {
                      // রিডাইরেক্ট ট্র্যাকিং
                      resolve(true);
                    } else {
                      resolve(false);
                    }
                  });
                });

                req.on("error", () => resolve(false));
                req.on("timeout", () => { req.destroy(); resolve(false); });
                req.end();
              });

              if (isLive) return true;
              if (i < retries - 1) {
                console.log(`Retrying... Attempt ${i + 2} of ${retries}`);
                await new Promise(r => setTimeout(r, 2000)); // ২ সেকেন্ড বিরতি
              }
            }
            return false;
          }

          async function checkUrl(url) {
            let cleanUrl = url.split("|")[0].trim();
            let headers = { 
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "*/*"
            };
            
            if (url.includes("|")) {
              let parts = url.split("|")[1].split("&");
              parts.forEach(p => {
                if (p.includes("=")) {
                  let kv = p.split("=");
                  let key = kv[0].trim().toLowerCase();
                  let val = kv[1].trim();
                  if(key === "referer") headers["Referer"] = val;
                  if(key === "user-agent") headers["User-Agent"] = val;
                }
              });
            }

            return await fetchWithRetry(cleanUrl, headers);
          }

          async function start() {
            if (!fs.existsSync("channels.json")) {
              console.log("channels.json found না!");
              return;
            }
            
            let channels = JSON.parse(fs.readFileSync("channels.json", "utf8"));
            let changed = false;
            let onlineCount = 0;

            console.log(`Checking ${channels.length} channels carefully...`);

            for (let ch of channels) {
              console.log(`Checking: ${ch.name}`);
              let isLive = await checkUrl(ch.url);
              let newStatus = isLive ? "Online" : "Offline";
              
              if (isLive) onlineCount++;

              if (ch.status !== newStatus) {
                console.log(`[STATUS CHANGED] ${ch.name}: ${ch.status || "Offline"} -> ${newStatus}`);
                ch.status = newStatus;
                changed = true;
              }
            }

            // প্লেলিস্ট এবং ডাটাবেজ আপডেট
            if (changed || !fs.existsSync("playlist.m3u")) {
              fs.writeFileSync("channels.json", JSON.stringify(channels, null, 2));
              
              let m3u = "#EXTM3U\n";
              channels.forEach(ch => {
                if (ch.status === "Online") { 
                  let cleanUrl = ch.url.split("|")[0].trim();
                  let extra = "";
                  if (ch.url.includes("|")) {
                    let parts = ch.url.split("|")[1].split("&");
                    parts.forEach(p => {
                      if (p.includes("=")) {
                        let kv = p.split("=");
                        if(kv[0].toLowerCase() === "referer") extra += `|Referer=${kv[1]}`;
                        if(kv[0].toLowerCase() === "user-agent") extra += `|User-Agent=${kv[1]}`;
                      }
                    });
                  }
                  m3u += `#EXTINF:-1 tvg-id=\"${ch.serial}\" tvg-name=\"${ch.name}\" tvg-logo=\"${ch.logo}\" group-title=\"${ch.category}\",${ch.name}\n${cleanUrl}${extra}\n`;
                }
              });
              
              fs.writeFileSync("playlist.m3u", m3u);
              console.log("Database and M3U Playlist synced successfully.");
            }

            // শর্ত ৬: README.md আপডেট করার ট্র্যাকার (বাংলাদেশ সময় অনুযায়ী)
            let bdtTime = new Date(new Date().getTime() + (6 * 60 * 60 * 1000)).toISOString().replace("T", " ").substring(0, 19);
            let readmeContent = `## 🤖 NowshinTV Auto-Sync Tracker\n\n`;
            readmeContent += `| Status | Count |\n| --- | --- |\n`;
            readmeContent += `| **Total Channels** | ${channels.length} |\n`;
            readmeContent += `| **🟢 Online** | ${onlineCount} |\n`;
            readmeContent += `| **🔴 Offline (Removed from Playlist)** | ${channels.length - onlineCount} |\n\n`;
            readmeContent += `> **Last Auto-Sync:** ${bdtTime} (BST/BD Time)\n\n`;
            readmeContent += `*বটটি প্রতি ১৫ মিনিট পর পর স্বয়ংক্রিয়ভাবে যাচাই বাছাই করে অচল চ্যানেল রিমুভ এবং সচল চ্যানেল অ্যাড করে।*`;
            
            fs.writeFileSync("README.md", readmeContent);
          }
          start();
          '

      - name: Commit and Push Changes
        run: |
          git config --global user.name "NowshinTV Bot"
          git config --global user.email "bot@nowshintv.com"
          git add channels.json playlist.m3u README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Bot: Synced Status, Playlist & Tracker" && git push)
