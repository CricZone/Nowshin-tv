name: 15-Min Auto Channel Checker Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-channels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Checker Script
        run: |
          node -e '
          const fs = require("fs");
          const https = require("https");
          const http = require("http");

          // নিখুঁতভাবে স্ট্রীম ভ্যালিডেশন করার ফাংশন
          async function checkUrl(url) {
            let cleanUrl = url.split("|")[0].trim();
            let headers = { 
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "*/*"
            };
            
            if (url.includes("|")) {
              let parts = url.split("|")[1].split("&");
              parts.forEach(p => {
                if (p.includes("=")) {
                  let kv = p.split("=");
                  let key = kv[0].trim().toLowerCase();
                  let val = kv[1].trim();
                  if(key === "referer") headers["Referer"] = val;
                  if(key === "user-agent") headers["User-Agent"] = val;
                }
              });
            }

            return new Promise((resolve) => {
              try {
                const client = cleanUrl.startsWith("https") ? https : http;
                
                // তোফি এবং টোকেন লিঙ্কের জন্য সরাসরি GET রিকোয়েস্ট ডেটা চেক করতে হবে
                const options = { 
                  method: "GET", 
                  headers: headers, 
                  timeout: 9000 // নেটওয়ার্ক স্লো থাকলে সর্বোচ্চ ৯ সেকেন্ড অপেক্ষা করবে
                };

                const req = client.request(cleanUrl, options, (res) => {
                  let statusCode = res.statusCode;
                  let contentType = (res.headers["content-type"] || "").toLowerCase();

                  // যদি সার্ভার সাকসেস (২০০) দেয়, তবে ভেতরের কন্টেন্ট চেক করব
                  if (statusCode >= 200 && statusCode < 300) {
                    let bodyData = "";
                    
                    // পুরো ফাইল ডাউনলোড করার দরকার নেই, প্রথম chunk/ডাটা পেলেই আমরা বুঝতে পারব এটা আসল m3u8 কিনা
                    res.on("data", (chunk) => {
                      bodyData += chunk.toString();
                      // যদি প্রথম ৫০০ ক্যারেক্টারের মধ্যে আসল m3u8 এর ডাটা না থাকে, অথবা HTML ট্যাগ থাকে তবে অফলাইন
                      if (bodyData.length >= 500 || bodyData.includes("#EXTM3U") || bodyData.includes("#EXT-X-STREAM-INF")) {
                        req.destroy(); // রিকোয়েস্ট এখানেই বন্ধ করে দাও সময় বাঁচাতে
                      }
                    });

                    res.on("end", () => {
                      let content = bodyData.trim();
                      
                      // অত্যন্ত নিখুঁত যাচাইকরণ: 
                      // ১. কন্টেন্ট টাইপ যদি HTML বা plain text হয় এবং তাতে আসল m3u8 এর কোনো চিহ্ন না থাকে, তবে এটা ফেক/এরর পেজ।
                      if (contentType.includes("html") || content.startsWith("<!doctype") || content.startsWith("<html")) {
                        resolve(false);
                      } 
                      // ২. তোফি বা অন্যান্য লিঙ্কের m3u8 ফাইলে অবশ্যই #EXTM3U বা #EXT-X লেখা থাকতে হবে।
                      else if (content.includes("#EXTM3U") || content.includes("#EXT-X") || contentType.includes("mpegurl") || contentType.includes("apple") || contentType.includes("video")) {
                        resolve(true); // ১০০% নিশ্চিত লাইভ চ্যানেল
                      } else {
                        // যদি কোনো সন্দেহজনক টেক্সট আসে (যেমন: Link Expired বা unauthorized)
                        resolve(false);
                      }
                    });
                  } 
                  // রিডাইরেক্ট ট্র্যাকিং (৩০০ এর ঘর)
                  else if (statusCode >= 300 && statusCode < 400) {
                    resolve(true); 
                  } 
                  // যেকোনো সার্ভার এরর (৪০৪, ৪০৩, ৫০০ ইত্যাদি) আসলে চোখ বন্ধ করে অফলাইন
                  else {
                    resolve(false);
                  }
                });

                req.on("error", () => resolve(false));
                req.on("timeout", () => { req.destroy(); resolve(false); });
                req.end();
              } catch (e) {
                resolve(false);
              }
            });
          }

          async function start() {
            if (!fs.existsSync("channels.json")) {
              console.log("channels.json fileটি খুঁজে পাওয়া যায়নি!");
              return;
            }
            
            let channels = JSON.parse(fs.readFileSync("channels.json", "utf8"));
            let changed = false;

            console.log(`যাচাইকরণ শুরু হলো: মোট ${channels.length}টি চ্যানেল চেক করা হচ্ছে...`);

            for (let ch of channels) {
              let isLive = await checkUrl(ch.url);
              let newStatus = isLive ? "Online" : "Offline";
              
              if (ch.status !== newStatus) {
                console.log(`[অবস্থা পরিবর্তন] -> ${ch.name}: ${ch.status || "Unknown"} থেকে ${newStatus} হয়েছে।`);
                ch.status = newStatus;
                changed = true;
              }
            }

            // কোনো পরিবর্তন হলে অথবা প্লেলিস্ট ডিলিট হয়ে গিয়ে থাকলে নতুন করে ফাইল রাইট হবে
            if (changed || !fs.existsSync("playlist.m3u")) {
              fs.writeFileSync("channels.json", JSON.stringify(channels, null, 2));
              
              // M3U Playlist তৈরি (শুধুমাত্র লাইভ বা অনলাইন চ্যানেলগুলো থাকবে, বাকিগুলো আউট)
              let m3u = "#EXTM3U\n";
              channels.forEach(ch => {
                if (ch.status === "Online") { 
                  let cleanUrl = ch.url.split("|")[0].trim();
                  let extra = "";
                  if (ch.url.includes("|")) {
                    let parts = ch.url.split("|")[1].split("&");
                    parts.forEach(p => {
                      if (p.includes("=")) {
                        let kv = p.split("=");
                        if(kv[0].toLowerCase() === "referer") extra += `|Referer=${kv[1]}`;
                        if(kv[0].toLowerCase() === "user-agent") extra += `|User-Agent=${kv[1]}`;
                      }
                    });
                  }
                  m3u += `#EXTINF:-1 tvg-id=\"${ch.serial}\" tvg-name=\"${ch.name}\" tvg-logo=\"${ch.logo}\" group-title=\"${ch.category}\",${ch.name}\n${cleanUrl}${extra}\n`;
                }
              });
              
              fs.writeFileSync("playlist.m3u", m3u);
              console.log("সফলভাবে channels.json এবং playlist.m3u আপডেট করা হয়েছে।");
            } else {
              console.log("চ্যানেলের স্ট্যাটাসে কোনো পরিবর্তন নেই। প্লেলিস্ট আপ-টু-ডেট আছে।");
            }
          }
          start();
          '

      - name: Commit and Push Changes
        run: |
          git config --global user.name "NowshinTV Bot"
          git config --global user.email "bot@nowshintv.com"
          git add channels.json playlist.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Bot: Automated 15-Min Channel Sync Engine [Skip CI]" && git push)
