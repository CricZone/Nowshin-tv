name: 15-Min Stream Engine Auto Sync Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # প্রতি ১৫ মিনিট পর পর ব্যাকগ্রাউন্ডে অটো রান হবে
  workflow_dispatch:      # প্যানেল থেকে ইনস্ট্যান্ট বাটন প্রেস করলেও রান হবে

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Execute Live Link Verifier Bot Script
        run: |
          node -e "
          const fs = require('fs');

          async function checkUrl(fullUrl) {
            if (!fullUrl || typeof fullUrl !== 'string') return false;
            
            let cleanUrl = fullUrl.split('|')[0].trim();
            let hasReferer = fullUrl.includes('|referer=');
            let hasUA = fullUrl.includes('&User-Agent=');
            
            let headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            };
            
            if (hasReferer) {
              try { headers['Referer'] = fullUrl.split('|referer=')[1].split('&')[0]; } catch(e) {}
            }
            if (hasUA) {
              try { headers['User-Agent'] = fullUrl.split('&User-Agent=')[1]; } catch(e) {}
            }

            try {
              // AbortController ব্যবহার করা হয়েছে যাতে ৫ সেকেন্ডের বেশি সময় না নেয়
              const controller = new AbortController();
              const timeout = setTimeout(() => controller.abort(), 5000);

              const response = await fetch(cleanUrl, {
                method: 'GET',
                headers: headers,
                signal: controller.signal
              });
              
              clearTimeout(timeout);

              // স্ট্রিমিং সার্ভার যদি ২০০ থেকে ৩৯৯ এর মধ্যে কোনো রেসপন্স দেয়, অথবা যদি সিকিউরিটির জন্য ৪০৩/৪০৫ দেয় কিন্তু লিংকটি ভ্যালিড হয়
              if (response.status >= 200 && response.status < 400) {
                return true;
              }
              
              // কিছু প্রিমিয়াম সোর্স রিকোয়েস্ট ব্লক করলেও স্ট্রিম চালু থাকে, তাই সেগুলোকে আমরা সেফ সাইডে রাখার জন্য অনলাইন রাখছি
              if (response.status === 403 || response.status === 405) {
                console.log('⚠️ Warning: Secure Stream detected (Status ' + response.status + ') for: ' + cleanUrl);
                return true; 
              }

              return false;
            } catch (e) {
              // যদি কানেকশন রিফিউজড না হয়ে শুধু টাইমআউট বা প্রোটোকল ইস্যু হয়, তবে চ্যানেলটি সচল থাকার সম্ভাবনাই বেশি
              if (e.name === 'AbortError') {
                return true; 
              }
              return false;
            }
          }

          async function startProcessor() {
            try {
              if (!fs.existsSync('database.json')) {
                fs.writeFileSync('database.json', '[]'); 
              }
              
              let fileContent = fs.readFileSync('database.json', 'utf8');
              let channels = [];
              if (fileContent.trim()) {
                channels = JSON.parse(fileContent);
              }
              
              console.log('Total Loaded Target Channels:', channels.length);

              for (let i = 0; i < channels.length; i++) {
                let ch = channels[i];
                console.log('Checking Status for: ' + ch.name);
                let isAlive = await checkUrl(ch.url);
                ch.status = isAlive ? 'Online' : 'Offline';
                console.log('Result for ' + ch.name + ': ' + ch.status);
              }

              fs.writeFileSync('database.json', JSON.stringify(channels, null, 2));

              let m3uContent = '#EXTM3U\n';
              channels.forEach(ch => {
                if (ch.status === 'Online') {
                  m3uContent += '#EXTINF:-1 tvg-id=\"' + ch.serial + '\" tvg-name=\"' + ch.name + '\" tvg-logo=\"' + ch.logo + '\" group-title=\"' + ch.category + '\",' + ch.name + '\n' + ch.url + '\n';
                }
              });
              
              fs.writeFileSync('playlist.m3u', m3uContent);
              console.log('playlist.m3u Generated Perfectly.');
            } catch (err) {
              console.error('Processor Error:', err);
            }
          }

          startProcessor();
          "

      - name: Commit And Push Synchronized Data to GitHub
        run: |
          git config --global user.name "NowshinTV Bot"
          git config --global user.email "bot@nowshintv.com"
          git add database.json playlist.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Cron Engine] Auto Synchronized Stream Network Playlist Assets" && git push)
