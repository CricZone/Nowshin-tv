name: 15-Min Stream Engine Auto Sync Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # প্রতি ১৫ মিনিট পর পর ব্যাকগ্রাউন্ডে অটো রান হবে
  workflow_dispatch:      # প্যানেল থেকে ইনস্ট্যান্ট বাটন প্রেস করলেও রান হবে

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # লেটেস্ট ভার্সনে আপগ্রেড করা হয়েছে

      - name: Setup Node.js Engine
        uses: actions/setup-node@v4  # লেটেস্ট ভার্সনে আপগ্রেড করা হয়েছে
        with:
          node-version: '20'  # এখানে ভুল ইনপুট ফিক্স করা হয়েছে

      - name: Execute Live Link Verifier Bot Script
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');
          const http = require('http');

          async function checkUrl(fullUrl) {
            let cleanUrl = fullUrl.split('|')[0].trim();
            let hasReferer = fullUrl.includes('|referer=');
            let hasUA = fullUrl.includes('&User-Agent=');
            
            let headers = {};
            if(hasReferer) headers['Referer'] = fullUrl.split('|referer=')[1].split('&')[0];
            if(hasUA) headers['User-Agent'] = fullUrl.split('&User-Agent=')[1];
            else headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36';

            return new Promise((resolve) => {
              const client = cleanUrl.startsWith('https') ? https : http;
              try {
                const req = client.request(cleanUrl, { method: 'HEAD', headers: headers, timeout: 5000 }, (res) => {
                  if (res.statusCode >= 200 && res.statusCode < 400) resolve(true);
                  else resolve(false);
                });
                req.on('error', () => resolve(false));
                req.on('timeout', () => { req.destroy(); resolve(false); });
                req.end();
              } catch (e) { resolve(false); }
            });
          }

          async function startProcessor() {
            if (!fs.existsSync('database.json')) {
              console.log('No database found.');
              process.exit(0);
            }
            
            let channels = JSON.parse(fs.readFileSync('database.json', 'utf8'));
            console.log('Total Loaded Target Channels:', channels.length);

            for (let i = 0; i < channels.length; i++) {
              let ch = channels[i];
              console.log('Checking Stream Security for:', ch.name);
              let isAlive = await checkUrl(ch.url);
              
              if (isAlive) {
                ch.status = 'Online';
              } else {
                ch.status = 'Offline';
              }
            }

            fs.writeFileSync('database.json', JSON.stringify(channels, null, 2));

            let m3uContent = '#EXTM3U\n';
            channels.forEach(ch => {
              if (ch.status === 'Online') {
                m3uContent += `#EXTINF:-1 tvg-id=\"${ch.serial}\" tvg-name=\"${ch.name}\" tvg-logo=\"${ch.logo}\" group-title=\"${ch.category}\",${ch.name}\n${ch.url}\n`;
              }
            });
            fs.writeFileSync('playlist.m3u', m3uContent);
            console.log('playlist.m3u Generated Perfectly.');
          }

          startProcessor();
          "

      - name: Commit And Push Synchronized Data to GitHub
        run: |
          git config --global user.name "NowshinTV Bot"
          git config --global user.email "bot@nowshintv.com"
          git add database.json playlist.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Cron Engine] Auto Synchronized Stream Network Playlist Assets" && git push)
