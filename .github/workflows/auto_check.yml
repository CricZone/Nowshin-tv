name: 🔄 NowshinTV Premium 24/7 Scanner

on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিট পর পর নিখুঁত অটো-চেক
  workflow_dispatch: 

jobs:
  check-streams:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install axios

    - name: Run Deep Stream Validation
      run: |
        cat << 'EOF' > scanner.js
        const fs = require('fs');
        const axios = require('axios');

        // ৩ বার নিখুঁত যাচাই লজিক (ভুল করে লাইভ চ্যানেল বন্ধ হবে না)
        async function verifyUrl(url) {
          const cleanUrl = url.split('|')[0].trim();
          const userAgents = [
            'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            'Mozilla/5.0 (Linux; Android 10; Televizo) Player/1.0',
            'VLC/3.0.18 LibVLC/3.0.18'
          ];
          
          for (let i = 0; i < 3; i++) {
            try {
              const res = await axios.get(cleanUrl, { 
                timeout: 8000,
                headers: { 
                  'User-Agent': userAgents[i % userAgents.length],
                  'Accept': '*/*'
                }
              });
              if (res.status === 200 || res.status === 206) return true;
            } catch (e) {
              if (e.response && [200, 206, 401, 403].includes(e.response.status)) {
                return true; // টোকেন বা সিকিউরড লিংক সচল ধরা হবে
              }
              if (i < 2) await new Promise(r => setTimeout(r, 2000)); // ফেল করলে ২ সেকেন্ড ব্রেক দিয়ে আবার চেষ্টা
            }
          }
          return false;
        }

        async function start() {
          if (!fs.existsSync('playlist.m3u')) return;
          const content = fs.readFileSync('playlist.m3u', 'utf8');
          const lines = content.split('\n');
          
          let updatedM3u = "#EXTM3U\n";
          let currentExt = null;

          for (let line of lines) {
            line = line.trim();
            if (!line || line === '#EXTM3U') continue;

            if (line.startsWith('#EXTINF:')) {
              currentExt = line;
            } else if (line.startsWith('http')) {
              const infoLine = currentExt ? currentExt : `#EXTINF:-1,Channel`;
              console.log(`🔍 Verifying Stream: ${line}`);
              
              const isLive = await verifyUrl(line);

              if (isLive) {
                // চ্যানেল সচল থাকলে স্বাভাবিকভাবে মেইন প্লেলিস্টে থাকবে
                let cleanInfo = infoLine.replace(" (OFFLINE)", "");
                updatedM3u += cleanInfo + '\n' + line + '\n';
                console.log(`🟢 [ONLINE] -> Stream is perfectly running.`);
              } else {
                // চ্যানেল বন্ধ হলে প্লেলিস্টে থাকবে কিন্তু (OFFLINE) ট্যাগ হবে যা Televizo ফিল্টার করে বাদ দেবে
                let cleanInfo = infoLine.replace(" (OFFLINE)", "");
                updatedM3u += `${cleanInfo} (OFFLINE)\n${line}\n`;
                console.log(`🔴 [OFFLINE] -> Stream is dead or down.`);
              }
              currentExt = null;
            }
          }
          fs.writeFileSync('playlist.m3u', updatedM3u);
        }
        start();
        EOF
        node scanner.js

    - name: Commit and Push Updates
      run: |
        git config --global user.name "NowshinTV-Bot"
        git config --global user.email "bot@nowshintv.com"
        git add playlist.m3u
        git diff-index --quiet HEAD || git commit -m "🔄 [Bot Sync] 24/7 Automation Sync Completed"
        git push
