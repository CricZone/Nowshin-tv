name: 🔄 NowshinTV 24/7 Auto Scanner

on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিট পর পর চেক করবে (ইনস্ট্যান্টের কাছাকাছি স্পিড পেতে)
  workflow_dispatch: 

jobs:
  check-channels:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install axios

    - name: Run Stream Validation Scanner
      run: |
        cat << 'EOF' > scanner.js
        const fs = require('fs');
        const axios = require('axios');

        async function verifyUrl(url) {
          const cleanUrl = url.split('|')[0].trim();
          for (let i = 0; i < 3; i++) {
            try {
              // HEAD রিকোয়েস্ট বেশি নিরাপদ এবং ফাস্ট, ব্লক হওয়ার চান্স কম
              const res = await axios.head(cleanUrl, { 
                timeout: 7000,
                headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) IPTV' }
              });
              if (res.status >= 200 && res.status < 400) return true;
            } catch (e) {
              // কিছু সার্ভার HEAD ব্লক করলে GET দিয়ে শেষ চেষ্টা করবে
              try {
                const resGet = await axios.get(cleanUrl, { timeout: 5000, headers: { 'User-Agent': 'Mozilla/5.0' } });
                if (resGet.status === 200) return true;
              } catch (err) {
                if (err.response && (err.response.status === 200 || err.response.status === 403 || err.response.status === 401)) return true;
              }
              await new Promise(r => setTimeout(r, 1500));
            }
          }
          return false;
        }

        async function start() {
          if (!fs.existsSync('playlist.m3u')) return;
          const content = fs.readFileSync('playlist.m3u', 'utf8');
          const lines = content.split('\n');
          
          let updatedM3u = "#EXTM3U\n";
          let currentExt = null;

          for (let line of lines) {
            line = line.trim();
            if (!line) continue;

            if (line.startsWith('#EXTINF:')) {
              currentExt = line;
            } else if (line.startsWith('http')) {
              // যদি আগের লাইনে #EXTINF না থাকে (শুধু লিংক থাকে)
              const infoLine = currentExt ? currentExt : `#EXTINF:-1,Channel`;
              
              console.log(`Checking: ${line}...`);
              const isLive = await verifyUrl(line);

              if (isLive) {
                // চ্যানেল লাইভ থাকলে যেভাবে আছে সেভাবেই থাকবে (যদি আগে ডিজেবল করা থাকে, সেটা কেটে যাবে)
                let cleanInfo = infoLine.replace(" (OFFLINE)", "");
                updatedM3u += cleanInfo + '\n' + line + '\n';
                console.log(`[🟢 ONLINE] -> Active`);
              } else {
                // 🛑 চ্যানেল বন্ধ হলে ডিলিট হবে না! নামের পাশে (OFFLINE) লেখা উঠবে যেন প্লেয়ারে না চলে
                let cleanInfo = infoLine.replace(" (OFFLINE)", "");
                updatedM3u += `${cleanInfo} (OFFLINE)\n${line}\n`;
                console.log(`[🔴 OFFLINE] -> Tagged as Offline`);
              }
              currentExt = null;
            }
          }
          fs.writeFileSync('playlist.m3u', updatedM3u);
        }
        start();
        EOF
        node scanner.js

    - name: Commit and Push Changes
      run: |
        git config --global user.name "NowshinTV-Bot"
        git config --global user.email "bot@nowshintv.com"
        git add playlist.m3u
        git diff-index --quiet HEAD || git commit -m "⚡ Smart Playlist Sync [Toggle Online/Offline]"
        git push
