name: 🔄 NowshinTV Premium 24/7 Auto Scanner

on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিট পর পর অটো-চেক (শর্ত ১, ২, ৩, ৮)
  workflow_dispatch:

jobs:
  check-streams:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install axios

    - name: Run Deep Stream Validation
      run: |
        cat << 'EOF' > scanner.js
        const fs = require('fs');
        const axios = require('axios');

        // সব ধরনের জটিল লিংক, রেফারার ও ইউজার এজেন্ট হ্যান্ডলিং (শর্ত ১৯)
        function parseUrlAndHeaders(rawUrl) {
          const parts = rawUrl.split('|');
          const cleanUrl = parts[0].trim();
          const headers = { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' };
          
          if (parts.length > 1) {
            const queryParts = parts[1].split('&');
            queryParts.forEach(p => {
              const kv = p.split('=');
              if (kv.length === 2) {
                const key = kv[0].trim().toLowerCase();
                const value = decodeURIComponent(kv[1].trim());
                if (key === 'referer') headers['Referer'] = value;
                if (key === 'user-agent') headers['User-Agent'] = value;
              }
            });
          }
          return { cleanUrl, headers };
        }

        // ৩ বার রি-ট্রাই লজিক যেন ভালো চ্যানেল ভুল করে বন্ধ না হয় (শর্ত ৪, ৫, ৯, ১১)
        async function verifyUrl(rawUrl) {
          const { cleanUrl, headers } = parseUrlAndHeaders(rawUrl);
          for (let i = 0; i < 3; i++) {
            try {
              const res = await axios.get(cleanUrl, { timeout: 7000, headers });
              if (res.status === 200 || res.status === 206) return true;
            } catch (e) {
              if (e.response && [200, 206, 401, 403].includes(e.response.status)) return true;
              if (i < 2) await new Promise(r => setTimeout(r, 2000));
            }
          }
          return false;
        }

        async function start() {
          if (!fs.existsSync('playlist.m3u')) return;
          const content = fs.readFileSync('playlist.m3u', 'utf8');
          const lines = content.split('\n');
          
          let updatedM3u = "#EXTM3U\n";
          let currentExt = null;

          for (let line of lines) {
            line = line.trim();
            if (!line || line === '#EXTM3U') continue;

            if (line.startsWith('#EXTINF:')) {
              currentExt = line;
            } else if (line.startsWith('http')) {
              const infoLine = currentExt || `#EXTINF:-1,Channel`;
              const isLive = await verifyUrl(line);

              let cleanInfo = infoLine.replace(" (OFFLINE)", "");
              if (isLive) {
                // চ্যানেল চালু থাকলে স্বাভাবিকভাবে অ্যাড হবে (শর্ত ৩)
                updatedM3u += cleanInfo + '\n' + line + '\n';
              } else {
                // বন্ধ থাকলে (OFFLINE) ট্যাগ বসবে যা Televizo থেকে হাইড হয়ে যাবে (শর্ত ২)
                updatedM3u += `${cleanInfo} (OFFLINE)\n${line}\n`;
              }
              currentExt = null;
            }
          }
          fs.writeFileSync('playlist.m3u', updatedM3u);
        }
        start();
        EOF
        node scanner.js

    - name: Commit and Push Updates
      run: |
        git config --global user.name "NowshinTV-Bot"
        git config --global user.email "bot@nowshintv.com"
        git add playlist.m3u
        git diff-index --quiet HEAD || git commit -m "🔄 [Bot Sync] 24/7 Automation Sync Completed"
        git push
