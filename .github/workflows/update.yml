name: Update Channel Files

on:
  repository_dispatch:
    types: [update-channels]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Save Updated Files
        run: |
          echo '${{ github.event.client_payload.json_data }}' > channels.json
          echo "${{ github.event.client_payload.m3u_data }}" > playlist.m3u

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json playlist.m3u
          git commit -m "Auto updated channels via Admin Panel" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GH_TOKEN }}
